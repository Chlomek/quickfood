name: quickfood
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.3.0
  firebase_database: ^12.1.1 
  cloud_firestore: ^6.1.1    
  firebase_auth: ^6.1.3      
  firebase_messaging: ^16.1.0
  google_sign_in: ^7.1.1
  flutter_local_notifications: ^19.4.2
  provider: ^6.1.5+1  
  flutter_localization: ^0.3.3      
  flutter_svg: ^2.2.3
  intl: 0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

fonts:
  - family: Sen
    fonts:
      - asset: assets/fonts/Sen-Regular.ttf
      - asset: assets/fonts/Sen-Medium.ttf
        weight: 500
      - asset: assets/fonts/Sen-SemiBold.ttf
      - asset: assets/fonts/Sen-Bold.ttf
        weight: 700
      - asset: assets/fonts/Sen-ExtraBold.ttf
        weight: 800
